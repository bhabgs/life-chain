# Gitee Go 配置示例
#
# 使用方法：
#   1. 在 Gitee 仓库中创建 .gitee/workflows/ 目录
#   2. 复制此文件到 .gitee/workflows/check-protected-files.yml
#   3. 在 Gitee 项目设置中启用 Gitee Go

name: 检查受保护文件

on:
  pull_request:
    branches:
      - master
      - develop

jobs:
  check-protected-files:
    name: 检查受保护文件修改
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置 Git 配置
        run: |
          git config --global user.email "ci@gitee.com"
          git config --global user.name "Gitee CI"

      - name: 执行检查脚本
        run: |
          chmod +x scripts/check-protected-files.sh
          bash scripts/check-protected-files.sh
        env:
          GITEE_GO: "true"
          CI: "true"

      - name: 输出检查结果
        if: always()
        run: |
          echo "检查完成"
          echo "如果修改了受保护文件，请确保："
          echo "  1. 已与负责人沟通"
          echo "  2. PR 描述完整"
          echo "  3. 已添加审查人员"

  # 代码规范检查（示例）
  lint:
    name: 代码规范检查
    runs-on: ubuntu-latest
    needs: check-protected-files

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3

      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 安装依赖
        run: npm ci

      - name: 运行 Lint
        run: npm run lint

  # 单元测试（示例）
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3

      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 安装依赖
        run: npm ci

      - name: 运行测试
        run: npm run test

      - name: 上传测试覆盖率
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage
          path: coverage/
